services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # Bind mount to the /data array, not a Docker-managed named volume —
      # relocated off the root disk (was /var/lib/docker/volumes/...).
      - /data/docker/nerve/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    # -database variant bundles the Prisma toolchain needed for its own
    # virtual-key store (spec Section 9: "per-key spend tracking").
    image: ghcr.io/berriai/litellm-database:v1.93.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    healthcheck:
      # wolfi-based image ships neither wget nor curl; the app is Python.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    # auto-setup creates the temporal/temporal_visibility databases and
    # schema itself against the existing postgres instance — no
    # pre-creation step needed (nerve_admin has CREATEDB via POSTGRES_USER).
    image: temporalio/auto-setup:1.29.7
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
    ports:
      - "127.0.0.1:7233:7233"
    healthcheck:
      # auto-setup binds the frontend to the container's bridge IP, not
      # 127.0.0.1 — use the compose service's own DNS name instead.
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  worker:
    # Debian-based (glibc), not alpine — @temporalio/core-bridge ships
    # prebuilt native bindings per libc, and intake/ (with its host-
    # installed node_modules) is bind-mounted straight into this container;
    # sharing one node_modules across host and container requires matching
    # libc, so no separate install step runs in here.
    image: node:20-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    depends_on:
      temporal:
        condition: service_healthy
      litellm:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_ARTIFACT_KEY: ${LITELLM_ARTIFACT_KEY}
      LITELLM_SKILL_KEY: ${LITELLM_SKILL_KEY}
    volumes:
      - ./intake:/app
      - ./output:/app/output
    command: ["node", "worker.js"]

  web:
    # Desktop app v0 backend (M4), mesh + mobile access (M5). Same glibc
    # base as worker, same shared node_modules via bind mount. Two literal
    # bindings only — never 0.0.0.0: 127.0.0.1 (SSH-tunnel fallback, M4)
    # and the host's Tailscale IP (mesh access, M5). Tailscale is host-
    # level and pre-existing, not a compose service — see README for the
    # IP's fragility note.
    image: node:20-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
      temporal:
        condition: service_healthy
      stt:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      NERVE_APP_PASSWORD: ${NERVE_APP_PASSWORD}
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_NORMALIZER_KEY: ${LITELLM_NORMALIZER_KEY}
      LITELLM_ROUTER_KEY: ${LITELLM_ROUTER_KEY}
      TEMPORAL_ADDRESS: temporal:7233
      WEB_PORT: "3000"
      WEB_HTTPS_PORT: "3443"
      # M6: HTTPS on the tailnet IP only — mic access needs a secure
      # context, which 127.0.0.1 already gets via the loopback exception.
      TLS_CERT_PATH: /certs/tvg-ai-server-1.taild4a3b1.ts.net.crt
      TLS_KEY_PATH: /certs/tvg-ai-server-1.taild4a3b1.ts.net.key
      STT_BASE_URL: http://stt:8000
    ports:
      - "127.0.0.1:3000:3000"
      - "100.107.203.17:3000:3000"
      - "100.107.203.17:3443:3443"
    volumes:
      - ./intake:/app
      - ./output:/app/output
      - ./certs:/certs:ro
    command: ["node", "web/server.js"]

  stt:
    # M6: local speech-to-text, no egress. Spec Section 10 open decision 2
    # resolved: local (not hosted/GPU) — CPU/int8 faster-whisper via the
    # speaches server (OpenAI-compatible /v1/audio/transcriptions).
    # Internal-only: no ports published to the host, reachable only from
    # other compose services on the internal network.
    image: ghcr.io/speaches-ai/speaches:0.8.3-cpu
    restart: unless-stopped
    environment:
      WHISPER__INFERENCE_DEVICE: cpu
      WHISPER__COMPUTE_TYPE: int8
    volumes:
      # Model cache on the /data array, not the root disk — same
      # convention as postgres's relocated data.
      - /data/docker/nerve/stt-hf-cache:/home/ubuntu/.cache/huggingface/hub
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
