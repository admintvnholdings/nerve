<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nerve — v0</title>
<style>
  /* Same page for every device (spec Section 4.1) — differences here are
     layout only: viewport handling, touch-sized controls, a scrollable
     table wrapper. No new functionality rides along. */
  * { box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
  h1 { font-size: 1.3rem; }
  h2 { font-size: 1rem; margin-top: 2rem; color: #444; }
  textarea { width: 100%; font: inherit; padding: 0.5rem; }
  button { font: inherit; padding: 0.6rem 1rem; margin: 0.25rem 0.5rem 0.25rem 0; cursor: pointer; }
  pre { background: #f4f4f4; padding: 0.75rem; overflow-x: auto; font-size: 0.85rem; }
  #panel { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-top: 1rem; min-height: 2rem; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; min-width: 640px; border-collapse: collapse; font-size: 0.85rem; }
  th, td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid #eee; }
  .muted { color: #888; }
  input[type=text] { font: inherit; padding: 0.5rem; width: 100%; max-width: 320px; }
  .finding { border: 1px solid #ddd; border-radius: 6px; padding: 0.75rem; margin-bottom: 0.75rem; }
  .finding.substantive { border-left: 4px solid #b45309; }
  .finding.bookkeeping { border-left: 4px solid #1d4ed8; }
  .finding .badge { display: inline-block; font-size: 0.75rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: #eee; margin-right: 0.3rem; }
  .finding textarea.reason { width: 100%; font: inherit; padding: 0.4rem; margin: 0.4rem 0; }
  @media (max-width: 480px) {
    body { margin: 1rem auto; }
    input[type=text] { max-width: 100%; display: block; margin: 0.4rem 0; }
    button { width: 100%; margin: 0.25rem 0; }
  }
</style>
</head>
<body>
  <h1>Nerve — v0</h1>

  <form id="submit-form">
    <textarea id="task-text" rows="3" placeholder="Describe a task, or use the mic..."></textarea>
    <div style="margin-top:0.5rem">
      <button type="submit">Submit</button>
      <button type="button" id="record-btn">🎙 Record</button>
      <span id="record-status" class="muted"></span>
    </div>
  </form>

  <div id="panel"><span class="muted">Nothing submitted yet.</span></div>

  <h2>Approval queue <button id="refresh-findings" type="button">Refresh</button></h2>
  <div id="findings-list"><span class="muted">Loading...</span></div>

  <h2>Run history <button id="refresh-runs" type="button">Refresh</button></h2>
  <div class="table-scroll">
    <table id="runs-table">
      <thead>
        <tr><th>Time</th><th>Source</th><th>Outcome</th><th>Confirmed/Overridden</th><th>Status</th><th>Cost</th><th>Tokens</th><th>Output</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script>
const panel = document.getElementById('panel');
let currentTaskId = null;

function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// M6: voice is just a way to fill the textarea (spec Section 4.3 —
// "same Intake as typed input"). Everything after this block — submit,
// clarify, confirm, run history — is untouched from M4/M5.
// MAX_RECORD_SECONDS mirrors intake/config.js's voiceMaxDurationSeconds —
// keep the two in sync if that value ever changes.
const MAX_RECORD_SECONDS = 180;
let mediaRecorder = null;
let audioChunks = [];
let recordTimerHandle = null;

function setRecordStatus(text) {
  document.getElementById('record-status').textContent = text;
}

async function startRecording() {
  if (!window.isSecureContext) {
    setRecordStatus('Mic needs HTTPS — use the :3443 URL, not :3000.');
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    setRecordStatus(`Mic access denied or unavailable: ${err.message}`);
    return;
  }

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    stream.getTracks().forEach((t) => t.stop());
    clearInterval(recordTimerHandle);
    void uploadRecording(new Blob(audioChunks, { type: mediaRecorder.mimeType }));
  };
  mediaRecorder.start();

  const recordBtn = document.getElementById('record-btn');
  recordBtn.textContent = '⏹ Stop';
  const startedAt = Date.now();
  recordTimerHandle = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    setRecordStatus(`Recording... ${elapsed}s / ${MAX_RECORD_SECONDS}s`);
    if (elapsed >= MAX_RECORD_SECONDS) stopRecording();
  }, 250);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  document.getElementById('record-btn').textContent = '🎙 Record';
}

async function uploadRecording(blob) {
  setRecordStatus('Transcribing... (local CPU model — can take up to a minute)');
  try {
    const form = new FormData();
    form.append('audio', blob, 'recording.webm');
    const res = await fetch('/api/transcribe', { method: 'POST', body: form });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
    document.getElementById('task-text').value = body.text;
    setRecordStatus('Transcribed — review and Submit.');
  } catch (err) {
    setRecordStatus(`Transcription failed: ${err.message}`);
  }
}

document.getElementById('record-btn').addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    startRecording();
  }
});

async function api(path, opts) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  const body = await res.json();
  if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
  return body;
}

function renderTerminal(data, label) {
  panel.innerHTML = `
    <p><strong>${label}</strong> ${data.reason ? '— ' + esc(data.reason) : ''}</p>
    ${data.runId ? `<p class="muted">Run recorded: ${data.runId}</p>` : ''}
  `;
  loadRuns();
}

function renderClarify(data) {
  currentTaskId = data.taskId;
  panel.innerHTML = `
    <p><strong>Clarifying question:</strong> ${esc(data.question)}</p>
    <input id="clarify-answer" type="text" size="50" placeholder="Your answer">
    <button id="clarify-submit" type="button">Submit answer</button>
  `;
  document.getElementById('clarify-submit').onclick = async () => {
    const answer = document.getElementById('clarify-answer').value;
    const data = await api(`/api/tasks/${currentTaskId}/clarify`, {
      method: 'POST', body: JSON.stringify({ answer }),
    });
    handleResponse(data);
  };
}

function renderRouteProposed(data) {
  currentTaskId = data.taskId;
  panel.innerHTML = `
    <p><strong>Normalized task:</strong></p>
    <pre>${esc(JSON.stringify(data.normalized, null, 2))}</pre>
    <p><strong>Proposed route:</strong></p>
    <pre>${esc(JSON.stringify(data.route, null, 2))}</pre>
    <p>Confidence ${data.route.overallConfidence} vs threshold ${data.routeConfidenceThreshold}
       (silence-default ${data.silenceDefaultEnabled ? 'enabled' : 'disabled'}) —
       explicit confirmation required.</p>
    <button id="confirm-btn" type="button">Confirm "${esc(data.route.outcome)}"</button>
    <input id="override-outcome" type="text" placeholder="override outcome" size="20">
    <button id="override-btn" type="button">Override</button>
  `;
  document.getElementById('confirm-btn').onclick = async () => {
    const data = await api(`/api/tasks/${currentTaskId}/confirm`, {
      method: 'POST', body: JSON.stringify({ action: 'confirm' }),
    });
    renderTerminal(data, `CONFIRMED: ${data.outcome}`);
  };
  document.getElementById('override-btn').onclick = async () => {
    const outcome = document.getElementById('override-outcome').value;
    const data = await api(`/api/tasks/${currentTaskId}/confirm`, {
      method: 'POST', body: JSON.stringify({ action: 'override', outcome }),
    });
    renderTerminal(data, `OVERRIDDEN: ${data.outcome}`);
  };
}

function handleResponse(data) {
  if (data.status === 'clarify') return renderClarify(data);
  if (data.status === 'route_proposed') return renderRouteProposed(data);
  return renderTerminal(data, data.status.toUpperCase());
}

document.getElementById('submit-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = document.getElementById('task-text').value.trim();
  if (!text) return;
  panel.innerHTML = '<span class="muted">Submitting...</span>';
  try {
    const data = await api('/api/tasks', { method: 'POST', body: JSON.stringify({ text }) });
    handleResponse(data);
  } catch (err) {
    panel.innerHTML = `<p style="color:red">Error: ${esc(err.message)}</p>`;
  }
});

// M7 approval queue.
function renderFinding(f) {
  const evidence = (f.evidence_run_ids || []).length
    ? `<p class="muted">Evidence (${f.evidence_run_ids.length} run${f.evidence_run_ids.length === 1 ? '' : 's'}): ${f.evidence_run_ids.map((id) => esc(id.slice(0, 8))).join(', ')}</p>`
    : '<p class="muted">Evidence: none (structural finding, not run-derived)</p>';
  return `
    <div class="finding ${esc(f.category || '')}">
      <span class="badge">${esc(f.kind)}</span>
      <span class="badge">${esc(f.category || 'n/a')}</span>
      <span class="badge">${esc(f.evidence_strength)}</span>
      <strong>${esc(f.target_artifact)}</strong>
      <p>n=${f.n} / gate=${f.gate_threshold ?? 'n/a'}</p>
      ${f.current_value ? `<p>Current: ${esc(f.current_value)}</p>` : ''}
      ${f.proposed_value ? `<p>Proposed: ${esc(f.proposed_value)}</p>` : ''}
      <p>${esc(f.rationale)}</p>
      ${evidence}
      ${f.status === 'pending' ? `
        <textarea class="reason" data-id="${f.id}" placeholder="Reason (required for either decision)" rows="2"></textarea>
        <button type="button" class="approve-btn" data-id="${f.id}">Approve</button>
        <button type="button" class="reject-btn" data-id="${f.id}">Reject</button>
      ` : `<p class="muted">Status: ${esc(f.status)}${f.decision_reason ? ` — "${esc(f.decision_reason)}"` : ''}</p>`}
    </div>
  `;
}

async function decideFinding(id, action) {
  const reason = document.querySelector(`textarea.reason[data-id="${id}"]`)?.value.trim();
  if (!reason) { alert('A reason is required.'); return; }
  try {
    await api(`/api/findings/${id}/${action}`, { method: 'POST', body: JSON.stringify({ reason }) });
    loadFindings();
  } catch (err) {
    alert(`Failed: ${err.message}`);
  }
}

async function loadFindings() {
  const rows = await api('/api/findings?status=pending');
  const container = document.getElementById('findings-list');
  container.innerHTML = rows.length
    ? rows.map(renderFinding).join('')
    : '<p class="muted">No pending findings.</p>';
  container.querySelectorAll('.approve-btn').forEach((btn) => {
    btn.addEventListener('click', () => decideFinding(btn.dataset.id, 'approve'));
  });
  container.querySelectorAll('.reject-btn').forEach((btn) => {
    btn.addEventListener('click', () => decideFinding(btn.dataset.id, 'reject'));
  });
}

document.getElementById('refresh-findings').addEventListener('click', loadFindings);
loadFindings();

async function loadRuns() {
  const rows = await api('/api/runs?limit=50');
  const tbody = document.querySelector('#runs-table tbody');
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${new Date(r.created_at).toLocaleString()}</td>
      <td>${esc(r.source_device)}</td>
      <td>${esc(r.outcome)}</td>
      <td>${esc(r.confirmed_overridden || '')}</td>
      <td>${esc(r.status || '')}</td>
      <td>${r.cost_usd ?? ''}</td>
      <td>${r.tokens ?? ''}</td>
      <td>${r.output_ref ? esc(r.output_ref) : ''}</td>
    </tr>
  `).join('');
}

document.getElementById('refresh-runs').addEventListener('click', loadRuns);
loadRuns();
setInterval(loadRuns, 5000);
</script>
</body>
</html>
